qlib_init:
  provider_uri: Explore1/data/qlib/cn_data
  region: cn
market: mcap500_mainboard_20251231
benchmark: SH000300
data_handler_config: &id001
  start_time: '2017-01-01'
  end_time: '2026-04-30'
  fit_start_time: '2017-01-01'
  fit_end_time: '2022-12-31'
  instruments: mcap500_mainboard_20251231
port_analysis_config: &id002
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy.signal_strategy
    kwargs:
      signal: <PRED>
      topk: 50
      n_drop: 5
  backtest:
    start_time: '2025-01-01'
    end_time: '2026-04-29'
    account: 1000000
    benchmark: SH000300
    exchange_kwargs:
      freq: day
      limit_threshold: 0.095
      deal_price: close
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5
task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.85
      learning_rate: 0.03
      subsample: 0.85
      lambda_l1: 80
      lambda_l2: 200
      max_depth: 7
      num_leaves: 128
      num_threads: 20
  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha360
        module_path: qlib.contrib.data.handler
        kwargs: *id001
      segments:
        train:
        - '2017-01-01'
        - '2022-12-31'
        valid:
        - '2023-01-01'
        - '2024-12-31'
        test:
        - '2025-01-01'
        - '2026-04-30'
  record:
  - class: SignalRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      model: <MODEL>
      dataset: <DATASET>
  - class: SigAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      ana_long_short: false
      ann_scaler: 252
  - class: PortAnaRecord
    module_path: qlib.workflow.record_temp
    kwargs:
      config: *id002
