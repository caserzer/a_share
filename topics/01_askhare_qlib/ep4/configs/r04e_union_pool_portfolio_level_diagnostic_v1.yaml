phase: ep4_r04e_union_pool_portfolio_level_diagnostic_v1
requirement_id: ep4_r04e_union_pool_portfolio_level_diagnostic_v1
short_name: r04e_union_pool_portfolio_level_diagnostic_v1
requirement_path: ep4/requirement_04e_union_pool_portfolio_level_diagnostic_v1.md
output_root: ep4/outputs/r04e_union_pool_portfolio_level_diagnostic_v1

upstream_r04c:
  output_root: ep4/outputs/r04c_candidate_pool_scanner_v1
  validation: ep4/outputs/r04c_candidate_pool_scanner_v1/manifests/r04c_candidate_pool_scanner_validation.json
  manifest: ep4/outputs/r04c_candidate_pool_scanner_v1/manifests/r04c_candidate_pool_scanner_manifest.json
  final_decision: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_final_decision.csv
  hold120_pool_profile: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_hold120_pool_profile.csv
  matched_baseline_delta_summary: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_matched_baseline_delta_summary.csv
  overlap_uniqueness_audit: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_overlap_uniqueness_audit.csv
  concentration_audit: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_concentration_audit.csv
  pool_registry_frozen: ep4/outputs/r04c_candidate_pool_scanner_v1/reports/r04c_pool_registry_frozen.csv
  pool_event_panel: ep4/outputs/r04c_candidate_pool_scanner_v1/cache/r04c_pool_event_panel.parquet
  matched_baseline_panel: ep4/outputs/r04c_candidate_pool_scanner_v1/cache/r04c_matched_baseline_panel.parquet

upstream_r04d:
  output_root: ep4/outputs/r04d_volume_money_relative_improvement_risk_budget_replay_v1
  validation: ep4/outputs/r04d_volume_money_relative_improvement_risk_budget_replay_v1/manifests/r04d_volume_money_relative_improvement_risk_budget_validation.json
  manifest: ep4/outputs/r04d_volume_money_relative_improvement_risk_budget_replay_v1/manifests/r04d_volume_money_relative_improvement_risk_budget_manifest.json
  final_decision: ep4/outputs/r04d_volume_money_relative_improvement_risk_budget_replay_v1/reports/r04d_final_decision.csv

upstream_r04b:
  output_root: ep4/outputs/r04b_fixed_entry_hold_exit_risk_budget_cta_diagnostic_v1
  validation: ep4/outputs/r04b_fixed_entry_hold_exit_risk_budget_cta_diagnostic_v1/manifests/r04b_fixed_entry_hold_exit_risk_budget_cta_validation.json
  manifest: ep4/outputs/r04b_fixed_entry_hold_exit_risk_budget_cta_diagnostic_v1/manifests/r04b_fixed_entry_hold_exit_risk_budget_cta_manifest.json

upstream_r02_family_precision:
  action_time_panel: ep4/outputs/r02_family_precision_forward_return_stats_v1/cache/r02_family_action_time_panel.parquet

price_provider:
  provider_type: qlib_pit_local
  price_source_path: data/qlib/cn_data_pit
  calendar_source_path: data/qlib/cn_data_pit/calendars/day.txt
  instrument_source_path: data/qlib/cn_data_pit/instruments/pit_mcap500_mainboard.txt
  required_qlib_fields: ["$open", "$high", "$low", "$close", "$volume", "$money", "$factor"]
  adjustment_policy: qlib_adjusted_ohlc_fields

split:
  train_start: "2017-07-04"
  train_end: "2021-12-31"
  validation_start: "2022-01-01"
  validation_end: "2023-12-31"
  robustness_start: "2024-01-01"
  robustness_end: "2025-12-31"

union_pool:
  union_pool_id: r04e_union_r02_volume_money_range_breakout_pullback_drawdown
  baseline_pool_id: baseline_A_r04_included_rps_episode_first_trigger
  source_pool_ids:
    - r02_precision_volume_money
    - r02_precision_range_breakout
    - r02_precision_pullback_drawdown
  source_family_ids:
    - volume_money
    - range_breakout
    - pullback_drawdown
  episode_gap_trading_days: 20
  nearby_window_trading_days: 20
  max_entry_price_rel_diff: 0.0001

execution:
  max_holding_days: 120
  max_entry_execution_lag_trading_days: 5
  max_exit_execution_lag_trading_days: 5
  return_type: simple_return
  execution_policy: close_signal_next_open

cost_model:
  cost_model_id: a_share_daily_replay_default_v1
  entry_slippage_bps: 5.0
  exit_slippage_bps: 5.0
  commission_bps_per_side: 3.0
  stamp_tax_bps_on_exit: 5.0
  min_fee_policy: none

policy_grid:
  holds:
    - hold_rule_id: hold_20d
      max_holding_days: 20
    - hold_rule_id: hold_40d
      max_holding_days: 40
    - hold_rule_id: hold_60d
      max_holding_days: 60
    - hold_rule_id: hold_120d
      max_holding_days: 120
  exits:
    no_exit:
      enabled: true
    break_even_after_gain:
      activation_gain_pct: [0.08, 0.10, 0.15]
    fixed_stop:
      stop_loss_pct: [-0.05, -0.08, -0.10]

portfolio_weighting:
  primary:
    - active_equal_weight
    - family_balanced_active_equal_weight
  daily_active_cap:
    primary: null
    sensitivity: [20, 40, 60]

baseline:
  hold120_no_exit_policy_id: hold_120d__no_exit__none

thresholds:
  max_gain50_threshold: 0.50
  minimum_matched_comparator_effective_sample_size: 300
  gate0_strong_validation_replay_complete_count: 2500
  gate0_conditional_validation_replay_complete_count: 2000
  gate0_conditional_min_validation_net_return_mean: -0.015
  gate0_min_matched_net_delta: 0.02
  pseudo_top1_instrument_sufficient_max: 0.03
  pseudo_top5_instrument_sufficient_max: 0.12
  pseudo_top1_industry_sufficient_max: 0.25
  pseudo_same_instrument_cluster_sufficient_max: 0.35
  pseudo_daily_candidate_p99_sufficient_max: 80
  pseudo_top1_instrument_concentrated_min: 0.05
  pseudo_top5_instrument_concentrated_min: 0.20
  pseudo_top1_industry_concentrated_min: 0.35
  pseudo_same_instrument_cluster_concentrated_min: 0.50
  pseudo_daily_candidate_p99_concentrated_min: 120
  validation_monthly_p10_min: -0.05
  validation_strong_retention_min: 0.80
  validation_conditional_retention_min: 0.60
  validation_active_day_share_min: 0.50
  validation_uncapped_active_count_p95_max: 80

validation:
  required_boundary_strings:
    - "R04e uses R04c failed descriptive leads as a frozen union diagnostic."
    - "R04e does not reinterpret any R04c pool as having passed validation."
    - "R04e does not reinterpret R04d as a policy pass."
    - "R04c final decision remains r04c_no_candidate_pool_passed_validation."
    - "R04d final decision remains r04d_no_policy_passed_validation."
    - "diagnostic only; no production entry rule is emitted"
