phase: ep4_r02_family_precision_forward_return_stats_v1
requirement_path: ep4/requirement_02_family_precision_forward_return_stats_v1.md
output_root: ep4/outputs/r02_family_precision_forward_return_stats_v1

upstream_r01:
  config: ep4/configs/r01_high_recall_probe_fail_fast_v2.yaml

upstream_r02_coverage:
  output_root: ep4/outputs/r02_big_winner_coverage_ratio_search_v1
  manifest: ep4/outputs/r02_big_winner_coverage_ratio_search_v1/manifests/r02_big_winner_coverage_manifest.json
  all_results: ep4/outputs/r02_big_winner_coverage_ratio_search_v1/reports/r02_big_winner_coverage_all.csv
  candidate_dictionary: ep4/outputs/r02_big_winner_coverage_ratio_search_v1/reports/r02_big_winner_coverage_candidate_dictionary.csv
  atomic_dictionary: ep4/outputs/r02_big_winner_coverage_ratio_search_v1/reports/r02_big_winner_coverage_atomic_condition_dictionary.csv

frozen_conditions:
  - family_id: momentum_rps
    condition_group_id: momentum_rps__and3__68b32373ce93
    condition_text: "roc5_r02 >= 0.05 AND rps5_r02 >= 0.8 AND rps10_r02 >= 0.5"
    terms:
      - {feature: roc5_r02, operator: ">=", threshold: 0.05}
      - {feature: rps5_r02, operator: ">=", threshold: 0.8}
      - {feature: rps10_r02, operator: ">=", threshold: 0.5}
  - family_id: oscillator
    condition_group_id: oscillator__and4__95dbd99ae828
    condition_text: "kdj_k5_r02 >= 60 AND cci5_r02 >= 100 AND kdj_k10_r02 >= 55 AND cci10_r02 >= 150"
    terms:
      - {feature: kdj_k5_r02, operator: ">=", threshold: 60}
      - {feature: cci5_r02, operator: ">=", threshold: 100}
      - {feature: kdj_k10_r02, operator: ">=", threshold: 55}
      - {feature: cci10_r02, operator: ">=", threshold: 150}
  - family_id: price_trend
    condition_group_id: price_trend__and3__6030760ed19f
    condition_text: "close_over_ma5_r02 >= 0.03 AND ema_slope5_r02 >= 0.0 AND close_over_ma10_r02 >= 0.03"
    terms:
      - {feature: close_over_ma5_r02, operator: ">=", threshold: 0.03}
      - {feature: ema_slope5_r02, operator: ">=", threshold: 0.0}
      - {feature: close_over_ma10_r02, operator: ">=", threshold: 0.03}
  - family_id: pullback_drawdown
    condition_group_id: pullback_drawdown__and3__11795aa42e45
    condition_text: "pullback_depth5_r02 >= -0.05 AND rebound_from_low5_r02 >= 0.05 AND days_since_high10_r02 <= 5"
    terms:
      - {feature: pullback_depth5_r02, operator: ">=", threshold: -0.05}
      - {feature: rebound_from_low5_r02, operator: ">=", threshold: 0.05}
      - {feature: days_since_high10_r02, operator: "<=", threshold: 5}
  - family_id: range_breakout
    condition_group_id: range_breakout__and3__00e51295d9c3
    condition_text: "range_position5_r02 >= 0.9 AND new_high_flag10_r02 == 1.0 AND range_position10_r02 >= 0.7"
    terms:
      - {feature: range_position5_r02, operator: ">=", threshold: 0.9}
      - {feature: new_high_flag10_r02, operator: "==", threshold: 1.0}
      - {feature: range_position10_r02, operator: ">=", threshold: 0.7}
  - family_id: volatility_band
    condition_group_id: volatility_band__and4__ef9c875dde10
    condition_text: "boll_pct_b5_r02 >= 0.8 AND boll_width5_r02 >= 1.0 AND boll_width10_r02 >= 1.0 AND price_channel_position10_r02 >= 0.8"
    terms:
      - {feature: boll_pct_b5_r02, operator: ">=", threshold: 0.8}
      - {feature: boll_width5_r02, operator: ">=", threshold: 1.0}
      - {feature: boll_width10_r02, operator: ">=", threshold: 1.0}
      - {feature: price_channel_position10_r02, operator: ">=", threshold: 0.8}
  - family_id: volume_money
    condition_group_id: volume_money__and4__4eb7a99e922f
    condition_text: "volume_ratio5_r02 >= 1.5 AND money_zscore5_r02 >= 2.0 AND money_price_coherence5_r02 == 1.0 AND money_price_coherence10_r02 == 1.0"
    terms:
      - {feature: volume_ratio5_r02, operator: ">=", threshold: 1.5}
      - {feature: money_zscore5_r02, operator: ">=", threshold: 2.0}
      - {feature: money_price_coherence5_r02, operator: "==", threshold: 1.0}
      - {feature: money_price_coherence10_r02, operator: "==", threshold: 1.0}

horizons: [1, 3, 5, 10, 20]
forward_label_horizon: 120
allowed_windows: [5, 10, 30, 60]
price_anchor_policy: close_anchor_headline_next_open_audit
split_policy: split_bounded_forward_windows

episode:
  merge_gap_trading_days: 5

bootstrap:
  enabled: true
  metric: precision_lift_feature_matched_h120_close_anchor
  confidence_level: 0.90
  iterations: 1000
  random_seed: 20260513
  resample_unit: instrument_year
  resample_scope: split_condition_group
  replacement: true
  percentile_method: nearest_rank

decision:
  decision_grain: stock_day
  min_signal_count: 500
  min_complete_h120_count: 500
  min_positive_h120_count: 20
  min_lift_validation: 1.50
  min_lift_robustness: 1.50
  min_bootstrap_lift_ci90_lower: 1.00
  require_t20_median_positive: true
  min_passing_family_count: 3
