qlib:
  market: mcap500_mainboard_20251231
  benchmark: SH000300
  required_fields:
  - $open
  - $high
  - $low
  - $close
  - $volume
  - $money
  - $factor
costs:
  account: 1000000
  freq: day
  deal_price: open
  open_cost: 0.0005
  close_cost: 0.0015
  min_cost: 5
  limit_threshold: 0.095
rules:
  market:
    ema: 60
    slope_window: 20
    record_ema: 120
  width:
    close_gt_ema60: 0.55
    ema20_gt_ema60: 0.45
  candidate:
    max_dist_ema20: 0.08
    atr_dist_multiplier: 2.0
    volatility_quantile: 0.9
    money_quantile: 0.2
  score:
    top_pct: 0.2
    winsor_lower: 0.01
    winsor_upper: 0.99
    weights:
      ema60_slope10: 0.25
      ret60_excess: 0.2
      ema20_ema60_spread: 0.15
      money_ratio20: 0.15
      ret20: 0.1
      adx_proxy20: 0.1
      overheat: -0.15
      volatility20: -0.1
  breakout:
    lookback: 60
    money_ratio: 1.2
    upper_shadow_max: 0.4
  pullback:
    ema_band_pct: 0.03
    recent_low_window: 5
  stops:
    fixed_stop_pct: 0.08
    atr_multiplier: 2.0
    structure_atr_buffer: 0.5
    time_stop_days: 10
    trailing_atr_multiplier: 2.0
  portfolio:
    max_positions: 20
    single_stock_max_weight: 0.05
    max_industry_weight: 0.25
    max_daily_new_weight: 0.2
    risk_degree: 0.95
    risk_unit_sizing_enabled: false
